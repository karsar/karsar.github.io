cv:
  name: Your Name
  label: Your Title/Role
  email: you@example.com
  location: Your City, Country
  image: ""
  summary: Write a short summary about yourself here.

  social_networks:
    - network: GitHub
      username: your-github-username
    - network: LinkedIn
      username: your-linkedin-username

  address:
    street: Your Street Address
    city: Your City
    region: Your State/Region
    postalCode: Your Postal Code
    countryCode: US

  sections:
    Education:
      - institution: Your University
        location: City, Country
        url: https://www.example.edu/
        area: Your Field of Study
        studyType: PhD
        start_date: 2018
        end_date: 2023
        score: ""
        courses: ""
        highlights:
          - Describe your research or achievements here.

    Experience:
      - company: Your Organization
        position: Your Position
        location: City, Country
        start_date: 2023
        end_date: present
        summary: Describe your role and responsibilities here.
        highlights:
          - Key achievement or responsibility 1.
          - Key achievement or responsibility 2.

    Skills:
      - name: Your Skill Area
        level: Expert
        icon: fa-solid fa-hashtag
        keywords: "Skill 1, Skill 2, Skill 3"

    Languages:
      - name: English
        summary: "Native speaker"

    Interests:
      - name: Your Interest
        icon: fa-solid fa-tag
        keywords: "Interest 1, Interest 2, Interest 3"
